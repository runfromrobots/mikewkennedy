<svg viewBox="0 0 1200 420" width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7C99A1" />
    </marker>
  </defs>

  <rect width="1200" height="420" fill="#08090D"/>

  <!-- step boxes -->
  <g font-family="Arial, sans-serif">

    <!-- Step 1 -->
    <rect x="40" y="90" width="240" height="240" rx="10" fill="#0a2540"/>
    <text x="160" y="135" text-anchor="middle" fill="#22E5FF" font-size="20" font-weight="bold">01</text>
    <text x="160" y="170" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">Prep</text>
    <text x="160" y="194" text-anchor="middle" fill="#7C99A1" font-size="13">Structure the Chaos</text>
    <foreignObject x="60" y="210" width="200" height="105">
      <div xmlns="http://www.w3.org/1999/xhtml" style="color:#E4F6F8; font-size:13px; font-family:Arial, sans-serif; text-align:center; line-height:1.4;">
        Rigid participant taxonomy and identical screening script, fixed before a single interview.
      </div>
    </foreignObject>

    <!-- Step 2 -->
    <rect x="320" y="90" width="240" height="240" rx="10" fill="#0e3a63"/>
    <text x="440" y="135" text-anchor="middle" fill="#22E5FF" font-size="20" font-weight="bold">02</text>
    <text x="440" y="170" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">Capture</text>
    <text x="440" y="194" text-anchor="middle" fill="#7C99A1" font-size="13">The Universal Lab</text>
    <foreignObject x="340" y="210" width="200" height="105">
      <div xmlns="http://www.w3.org/1999/xhtml" style="color:#E4F6F8; font-size:13px; font-family:Arial, sans-serif; text-align:center; line-height:1.4;">
        Physical and digital sessions funneled into one unified capture pipeline.
      </div>
    </foreignObject>

    <!-- Step 3 -->
    <rect x="600" y="90" width="240" height="240" rx="10" fill="#0e3a63"/>
    <text x="720" y="135" text-anchor="middle" fill="#22E5FF" font-size="20" font-weight="bold">03</text>
    <text x="720" y="170" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">Anchor</text>
    <text x="720" y="194" text-anchor="middle" fill="#7C99A1" font-size="13">Translate for AI</text>
    <foreignObject x="620" y="210" width="200" height="105">
      <div xmlns="http://www.w3.org/1999/xhtml" style="color:#E4F6F8; font-size:13px; font-family:Arial, sans-serif; text-align:center; line-height:1.4;">
        Verbal techniques convert physical pointing into searchable text.
      </div>
    </foreignObject>

    <!-- Step 4 -->
    <rect x="880" y="90" width="240" height="240" rx="10" fill="#0a2540"/>
    <text x="1000" y="135" text-anchor="middle" fill="#22E5FF" font-size="20" font-weight="bold">04</text>
    <text x="1000" y="170" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold">Synthesize</text>
    <text x="1000" y="194" text-anchor="middle" fill="#7C99A1" font-size="13">Diagnostic Matrices</text>
    <foreignObject x="900" y="210" width="200" height="105">
      <div xmlns="http://www.w3.org/1999/xhtml" style="color:#E4F6F8; font-size:13px; font-family:Arial, sans-serif; text-align:center; line-height:1.4;">
        Transcripts funneled into standardized usability scoring tables.
      </div>
    </foreignObject>

    <!-- arrows -->
    <line x1="282" y1="210" x2="316" y2="210" stroke="#7C99A1" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="562" y1="210" x2="596" y2="210" stroke="#7C99A1" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="842" y1="210" x2="876" y2="210" stroke="#7C99A1" stroke-width="3" marker-end="url(#arrow)"/>

    <text x="600" y="55" text-anchor="middle" fill="#2EE6FF" font-size="26" font-weight="bold">The AI-Augmented Methodology</text>
    <text x="600" y="385" text-anchor="middle" fill="#7C99A1" font-size="14">Use AI to handle volume, but heavily engineer the human inputs first</text>
  </g>
</svg>
